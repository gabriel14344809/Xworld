<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#020f2e" />
    <meta name="description" content="X World Travel Hub — Votre super app de voyage mondiale : vols, hôtels, VTC, météo, traducteur, Amazon, WeChat, IA et plus encore." />

    <!-- Open Graph / Social -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="X World Travel Hub" />
    <meta property="og:description" content="La super app de voyage mondiale — 20+ services en une seule application." />
    <meta property="og:image"       content="%PUBLIC_URL%/og-image.png" />
    <meta name="twitter:card"       content="summary_large_image" />

    <!-- PWA -->
    <link rel="manifest"    href="%PUBLIC_URL%/manifest.json" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- Fonts preload -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>X World Hub 🌍</title>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { height: 100%; }
      body {
        background: #020f2e;
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      /* Loading screen */
      #loading {
        position: fixed; inset: 0;
        background: linear-gradient(160deg,#020f2e,#041a4a,#062060);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999; transition: opacity 0.5s;
      }
      #loading.hidden { opacity: 0; pointer-events: none; }
      #loading-logo  { font-size: 64px; margin-bottom: 16px; animation: pulse 2s infinite; }
      #loading-title { font-size: 28px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
      #loading-sub   { font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 8px; }
      #loading-bar   { width: 200px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 99px; margin-top: 24px; overflow: hidden; }
      #loading-fill  { height: 100%; background: linear-gradient(90deg,#1d4ed8,#60b4ff); border-radius: 99px; animation: load 1.5s ease-in-out forwards; }
      @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
      @keyframes load  { from{width:0%} to{width:100%} }
    </style>
  </head>
  <body>
    <!-- Loading screen -->
    <div id="loading">
      <div id="loading-logo">🌍</div>
      <div id="loading-title">X WORLD HUB</div>
      <div id="loading-sub">Chargement de votre super app voyage...</div>
      <div id="loading-bar"><div id="loading-fill"></div></div>
    </div>

    <div id="root"></div>

    <script>
      // Hide loading screen when React mounts
      window.addEventListener('load', function() {
        setTimeout(function() {
          var el = document.getElementById('loading');
          if (el) { el.classList.add('hidden'); setTimeout(function(){ el.remove(); }, 600); }
        }, 1800);
      });
    </script>
  </body>
</html>
