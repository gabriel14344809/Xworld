<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#020f2e" />
    <meta name="description" content="X World Travel Hub — La super app de voyage mondiale" />
    <title>X World Hub 🌍</title>
    <style>
      * { margin:0; padding:0; box-sizing:border-box; }
      body { background:#020f2e; font-family:sans-serif; }
      #loading { position:fixed;inset:0;background:linear-gradient(160deg,#020f2e,#041a4a);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.5s; }
      #loading.hidden{opacity:0;pointer-events:none}
      #loading-logo{font-size:64px;margin-bottom:16px;animation:pulse 2s infinite}
      #loading-title{font-size:28px;font-weight:800;color:#fff;font-family:sans-serif}
      #loading-sub{font-size:13px;color:rgba(255,255,255,0.4);margin-top:8px}
      #loading-bar{width:200px;height:3px;background:rgba(255,255,255,0.1);border-radius:99px;margin-top:24px;overflow:hidden}
      #loading-fill{height:100%;background:linear-gradient(90deg,#1d4ed8,#60b4ff);border-radius:99px;animation:load 1.5s ease forwards}
      @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
      @keyframes load{from{width:0%}to{width:100%}}
    </style>
  </head>
  <body>
    <div id="loading">
      <div id="loading-logo">🌍</div>
      <div id="loading-title">X WORLD HUB</div>
      <div id="loading-sub">Chargement de votre super app voyage...</div>
      <div id="loading-bar"><div id="loading-fill"></div></div>
    </div>
    <div id="root"></div>
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var el = document.getElementById('loading');
          if (el) { el.classList.add('hidden'); setTimeout(function(){ el.remove(); }, 600); }
        }, 1800);
      });
    </script>
  </body>
</html>
